<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>2048</title>
    <link rel="stylesheet" href="./styles/main.scss">
    <link
      rel="icon"
      type="image/svg+xml"
      href="./images/favicon.svg"
    >
    <link rel="apple-touch-icon" href="./images/favicon.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#bbada0">
  </head>
  <body>
    <div class="container">
      <div class="game-header">
        <h1>2048</h1>
        <div class="controls">
          <p class="info">
            Score: <br><span class="game-score">0</span>
          </p>
          <button
            class="button undo-btn"
            id="undo-btn"
            disabled
          >
            <div class="undo-content">
              <span class="undo-icon">↺</span>
              <span class="undo-text">1 step</span>
            </div>
            <span class="undo-cooldown hidden">15</span>
            <div class="undo-bar"></div>
          </button>
          <button class="button start" id="start-btn">Start</button>
        </div>
      </div>

      <div class="game-field">
      </div>

      <div class="message-container">

        <p class="message message-start">Press "Start" to begin game. Good luck!</p>
        <p class="message">Best Score: <span class="game-best-score">0</span></p>
        <p class="message">Rostyslav Sobchyshyn</p>
        <button id="install-btn" class="button start install-btn">Add to Home Screen</button>
      </div>
    </div>
    <div class="modal-overlay hidden" id="resume-modal">
      <div class="modal-content">
        <p class="modal-message">Would you like to continue your last game?</p>
        <div class="modal-buttons">
          <button id="resume-yes" class="button start">Continue</button>
          <button id="resume-no" class="button restart">New Game</button>
        </div>
      </div>
    </div>
    
    <div class="modal-overlay hidden" id="lose-modal">
      <div class="modal-content">
        <p class="modal-message">Game Over!</p>
        <div class="modal-buttons">
          <button id="lose-restart" class="button restart">Try Again</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="win-modal">
      <div class="modal-content">
        <p class="modal-message">You Win! Congrats!</p>
        <div class="modal-buttons">
          <button id="win-continue" class="button start">Keep Going</button>
          <button id="win-restart" class="button restart">New Game</button>
        </div>
      </div>
    </div>

    </div>

    <script type="text/javascript" src="scripts/main.js"></script>
  </body>
</html>
